<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AutoVoice AI — Service Booking</title>
  <link rel="icon" href="/favicon.ico?v=20260428" type="image/x-icon" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0a0b0e;
      --surface:    #0f1117;
      --panel:      #13161d;
      --border:     #1e2230;
      --border2:    #252a38;
      --amber:      #e8a030;
      --amber-dim:  #9b6b1f;
      --amber-glow: rgba(232,160,48,.15);
      --red:        #e84040;
      --red-glow:   rgba(232,64,64,.2);
      --green:      #30c47a;
      --green-glow: rgba(48,196,122,.15);
      --text:       #c8cce0;
      --text-dim:   #4a5070;
      --text-bright:#edf0ff;
      --mono:       'Share Tech Mono', monospace;
      --head:       'Rajdhani', sans-serif;
      --body:       'Exo 2', sans-serif;
    }

    html { height: 100%; }

    body {
      font-family: var(--body);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
      position: relative;
    }

    /* Grid texture background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 55% 45% at 15% 8%, rgba(232,160,48,.05) 0%, transparent 55%),
        radial-gradient(ellipse 45% 55% at 85% 92%, rgba(48,196,122,.04) 0%, transparent 55%),
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,.013) 39px, rgba(255,255,255,.013) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,.013) 39px, rgba(255,255,255,.013) 40px);
      pointer-events: none;
      z-index: 0;
    }

    /* Scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.04) 2px, rgba(0,0,0,.04) 4px);
      pointer-events: none;
      z-index: 999;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: clamp(10px,2vh,18px) clamp(16px,3vw,40px);
      border-bottom: 1px solid var(--border);
      background: rgba(10,11,14,.9);
      backdrop-filter: blur(16px);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 0;
      text-decoration: none;
    }
    .logo-word {
      font-family: var(--head);
      font-size: clamp(1.1rem,2.2vw,1.5rem);
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .logo-word.w1 { color: var(--text-bright); }
    .logo-word.w2 { color: var(--amber); }
    .logo-badge {
      font-family: var(--mono);
      letter-spacing: 0.14em;
      margin-left: 8px;
      align-self: center;
      border: 1px solid var(--border2);
      padding: 3px 4px 3px 6px;
      border-radius: 2px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: var(--mono);
      font-size: clamp(0.8rem,0.9vw,0.7rem);
      color: var(--text-dim);
      border: 1px solid var(--border);
      padding: 5px 12px;
      border-radius: 2px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: all .35s;
      white-space: nowrap;
    }
    .status-pill .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: all .35s;
      flex-shrink: 0;
    }
    .status-pill.active  { color: var(--amber); border-color: var(--amber-dim); }
    .status-pill.active .dot { background: var(--amber); box-shadow: 0 0 7px var(--amber); animation: blink-dot 1.8s ease-in-out infinite; }
    .status-pill.recording { color: var(--red); border-color: var(--red); }
    .status-pill.recording .dot { background: var(--red); box-shadow: 0 0 9px var(--red); animation: blink-dot .7s ease-in-out infinite; }
    .status-pill.playing { color: var(--green); border-color: var(--green); }
    .status-pill.playing .dot { background: var(--green); box-shadow: 0 0 7px var(--green); }
    .status-pill.error { color: var(--red); border-color: var(--red); }
    @keyframes blink-dot { 0%,100%{opacity:1} 50%{opacity:.25} }

    /* ── MAIN ── */
    main {
      position: relative;
      z-index: 10;
      display: grid;
      grid-template-columns: minmax(260px, 2fr) 3fr;
      min-height: 0;
      overflow: hidden;
    }

    /* ── LEFT PANEL ── */
    .panel-left {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(16px,3vh,30px);
      padding: clamp(16px,3vw,36px) clamp(14px,2.5vw,32px);
      border-right: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    /* Corner brackets */
    .brk { position: absolute; width: 16px; height: 16px; border-color: var(--border2); border-style: solid; }
    .brk-tl { top: 10px; left: 10px; border-width: 2.5px 0 0 2.5px; }
    .brk-tr { top: 10px; right: 10px; border-width: 2.5px 2.5px 0 0; }
    .brk-bl { bottom: 10px; left: 10px; border-width: 0 0 2.5px 2.5px; }
    .brk-br { bottom: 10px; right: 10px; border-width: 0 2.5px 2.5px 0; }

    /* Viz + mic */
    .viz-wrap {
      position: relative;
      flex-shrink: 0;
    }
    canvas#viz { display: block; }

    #mic-btn {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: clamp(52px,7vw,76px);
      height: clamp(52px,7vw,76px);
      border-radius: 50%;
      border: 2px solid var(--amber);
      background: rgba(232,160,48,.07);
      color: var(--amber);
      font-size: clamp(1.2rem,2.2vw,1.7rem);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .22s ease;
      z-index: 2;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      outline: none;
    }
    #mic-btn:hover:not(:disabled) {
      background: rgba(232,160,48,.14);
      box-shadow: 0 0 28px rgba(232,160,48,.28), inset 0 0 14px rgba(232,160,48,.04);
      transform: translate(-50%,-50%) scale(1.05);
    }
    #mic-btn:active:not(:disabled) { transform: translate(-50%,-50%) scale(.96); }
    #mic-btn.recording {
      border-color: var(--red); background: rgba(232,64,64,.1); color: var(--red);
      box-shadow: 0 0 36px rgba(232,64,64,.38), inset 0 0 18px rgba(232,64,64,.07);
      animation: rec-pulse 1s ease-in-out infinite;
    }
    #mic-btn.playing {
      border-color: var(--green); background: rgba(48,196,122,.08); color: var(--green);
      box-shadow: 0 0 26px rgba(48,196,122,.3);
    }
    #mic-btn:disabled { opacity: .6; cursor: not-allowed; animation: none; }
    @keyframes rec-pulse {
      0%,100% { box-shadow: 0 0 22px rgba(232,64,64,.3); }
      50%      { box-shadow: 0 0 48px rgba(232,64,64,.6); }
    }

    /* Wave bars (AI speaking) */
    .wave-bars {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 3px;
      height: 22px;
      flex-shrink: 0;
    }
    .wave-bars.on { display: flex; }
    .wave-bars span {
      width: 3px; border-radius: 2px;
      background: var(--green);
      animation: wavebar 1s ease-in-out infinite;
    }
    .wave-bars span:nth-child(1){height:7px; animation-delay:0s}
    .wave-bars span:nth-child(2){height:15px;animation-delay:.1s}
    .wave-bars span:nth-child(3){height:21px;animation-delay:.2s}
    .wave-bars span:nth-child(4){height:13px;animation-delay:.3s}
    .wave-bars span:nth-child(5){height:19px;animation-delay:.15s}
    .wave-bars span:nth-child(6){height:9px; animation-delay:.25s}
    .wave-bars span:nth-child(7){height:17px;animation-delay:.05s}
    @keyframes wavebar {
      0%,100%{transform:scaleY(.35);opacity:.4}
      50%    {transform:scaleY(1);opacity:1}
    }

    /* Connect form */
    .connect-block {
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field-label {
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--text-dim);
      letter-spacing: 0.2rem;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .input-row {
      display: flex;
      border: 1px solid var(--border2);
      border-radius: 3px;
      overflow: hidden;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-row:focus-within {
      border-color: var(--amber-dim);
      box-shadow: 0 0 0 1px rgba(232,160,48,.08), 0 0 16px rgba(232,160,48,.06);
    }

    #phone-input {
      flex: 1;
      background: var(--surface);
      border: none;
      color: var(--text-bright);
      font-family: var(--mono);
      font-size: clamp(0.78rem,1.2vw,0.88rem);
      padding: clamp(9px,1.4vh,13px) 12px;
      outline: none;
      letter-spacing: 0.15em;
      min-width: 0;
    }
    #phone-input::placeholder { color: var(--text-dim); }

    #connect-btn {
      background: var(--amber);
      color: #090a0c;
      border: none;
      font-family: var(--head);
      font-weight: 700;
      font-size: clamp(0.7rem,1.1vw,0.8rem);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 0 clamp(12px,2vw,20px);
      cursor: pointer;
      transition: all .18s;
      flex-shrink: 0;
      white-space: nowrap;
    }
    #connect-btn:hover { background: #f0b040; }
    #connect-btn:active { background: #c88c28; }
    #connect-btn.disc {
      background: transparent;
      color: var(--red);
      border-left: 1px solid var(--border);
      letter-spacing: 0.12em;
    }
    #connect-btn.disc:hover { background: rgba(232,64,64,.08); }

    .err-line {
      font-family: var(--mono);
      font-size: 0.62rem;
      color: var(--red);
      letter-spacing: 0.06em;
      min-height: 16px;
      padding-left: 2px;
    }

    .mic-hint {
      font-family: var(--mono);
      font-size: clamp(0.56rem,0.9vw,0.66rem);
      color: var(--text-dim);
      text-align: center;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      line-height: 1.8;
    }
    .mic-hint em {
      display: block;
      color: var(--amber);
      font-style: normal;
      font-size: clamp(0.8rem,1vw,0.72rem);
      margin-bottom: 1px;
    }

    /* ── RIGHT PANEL ── */
    .panel-right {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .panel-hdr {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: clamp(9px,1.4vh,14px) clamp(14px,2vw,24px);
      border-bottom: 1px solid var(--border);
    }
    .panel-hdr-title {
      font-family: var(--mono);
      font-size: 0.62rem;
      color: var(--text-dim);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    .panel-hdr-title em { color: var(--amber); font-style: normal; }

    .panel-hdr-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .hdr-stat {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .hdr-stat strong { color: var(--text); font-weight: 400; }

    /* Log */
    #log {
      flex: 1;
      overflow-y: auto;
      padding: clamp(14px,2.2vh,22px) clamp(14px,2vw,26px);
      display: flex;
      flex-direction: column;
      gap: clamp(10px,1.8vh,16px);
      scroll-behavior: smooth;
      min-height: 0;
    }
    #log::-webkit-scrollbar { width: 3px; }
    #log::-webkit-scrollbar-track { background: transparent; }
    #log::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      opacity: .38;
      pointer-events: none;
    }
    .empty-icon {
      font-size: clamp(2rem,4vw,3rem);
      filter: grayscale(1) brightness(.6);
    }
    .empty-text {
      font-family: var(--mono);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: center;
      line-height: 2;
      filter: brightness(.7);
    }

    /* Messages */
    .msg {
      display: flex;
      flex-direction: column;
      max-width: min(86%, 480px);
      animation: msg-slide .22s ease-out;
    }
    @keyframes msg-slide {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg.user  { align-self: flex-end; }
    .msg.agent { align-self: flex-start; }

    .msg-meta {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 5px;
      padding: 0 3px;
    }
    .msg.user  .msg-meta { flex-direction: row-reverse; }
    .msg-role {
      font-family: var(--mono);
      font-size: 0.56rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    .msg.user  .msg-role { color: var(--amber); }
    .msg.agent .msg-role { color: var(--green); }
    .msg-ts {
      font-family: var(--mono);
      font-size: 0.52rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }

    .msg-bubble {
      padding: clamp(9px,1.6vh,13px) clamp(12px,2vw,18px);
      font-size: clamp(0.8rem,1.25vw,0.9rem);
      line-height: 1.6;
      word-break: break-word;
      border-radius: 3px;
      position: relative;
    }
    .msg.user .msg-bubble {
      background: rgba(232,160,48,.065);
      border: 1px solid rgba(232,160,48,.18);
      border-bottom-right-radius: 0;
      color: var(--text);
    }
    .msg.agent .msg-bubble {
      background: rgba(255,255,255,.025);
      border: 1px solid var(--border2);
      border-bottom-left-radius: 0;
      color: var(--text);
    }

    /* Typing dots */
    .msg.pending .msg-bubble { padding: clamp(11px,1.8vh,15px) 18px; }
    .dots { display: flex; align-items: center; gap: 5px; }
    .dots span {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--text-dim);
      animation: dot-jump 1.3s infinite ease-in-out;
    }
    .dots span:nth-child(2) { animation-delay: .18s; }
    .dots span:nth-child(3) { animation-delay: .36s; }
    @keyframes dot-jump {
      0%,60%,100%{transform:translateY(0);opacity:.35}
      30%        {transform:translateY(-6px);opacity:1}
    }

    /* ── FOOTER ── */
    footer {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: clamp(6px,1.1vh,10px) clamp(16px,3vw,40px);
      border-top: 1px solid var(--border);
      background: rgba(10,11,14,.9);
      backdrop-filter: blur(16px);
      flex-shrink: 0;
    }
    .f-stat {
      font-family: var(--mono);
      font-size: 0.56rem;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .f-stat strong { color: var(--text); font-weight: 400; }
    .f-divider {
      width: 1px; height: 12px;
      background: var(--border2);
      flex-shrink: 0;
    }
    .mic-hint {
      flex: 1;
      font-family: var(--mono);
      font-size: 0.70rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-align: center;
    }
    .mic-hint kbd {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 2px;
      padding: 3px 7px;
      font-family: var(--mono);
      font-size: 0.70rem;
      color: var(--amber);
      letter-spacing: 0.1em;
    }

    /* ── MOBILE (≤ 680px) ── */
    @media (max-width: 680px) {
      main {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }

      .panel-left {
        flex-direction: row;
        justify-content: flex-start;
        align-items: center;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 12px 14px;
        gap: 14px;
        flex-shrink: 0;
      }

      .brk { display: none; }
      .mic-hint { display: none; }
      .wave-bars { display: none !important; }

      .connect-block { flex: 1; max-width: none; gap: 6px; }
      .field-label { display: none; }

      .panel-right { flex: 1; min-height: 0; }

      footer {
        padding: 7px 14px;
      }
    }

    @media (max-width: 360px) {
      .logo-badge { display: none; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">
      <span class="logo-word w1">Auto</span><span class="logo-word w2">Voice</span>
      <span class="logo-badge">AI</span>
    </div>
    <div class="status-pill" id="status-pill">
      <div class="dot"></div>
      <span id="status-text">OFFLINE</span>
    </div>
  </header>

  <!-- MAIN -->
  <main>

    <!-- LEFT: Controls -->
    <div class="panel-left">
      <div class="brk brk-tl"></div>
      <div class="brk brk-tr"></div>
      <div class="brk brk-bl"></div>
      <div class="brk brk-br"></div>

      <!-- Visualizer -->
      <div class="viz-wrap" id="viz-wrap">
        <canvas id="viz"></canvas>
        <button id="mic-btn" disabled title="Hold to speak">🎙️</button>
      </div>

      <!-- Right side of left panel -->
      <div style="display:flex;flex-direction:column;align-items:center;gap:clamp(12px,2.5vh,24px);width:100%;max-width:300px;">

        <div class="wave-bars" id="wave-bars">
          <span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span>
        </div>

        <div class="connect-block">
          <div class="field-label">Phone Number</div>
          <div class="input-row">
            <input id="phone-input" type="tel" placeholder="Enter number…" autocomplete="tel" inputmode="tel" />
            <button id="connect-btn">CONNECT</button>
          </div>
          <div class="err-line" id="err-line"></div>
        </div>

        <div class="mic-hint">
          <em id="mic-state">STAND BY</em>
          <kbd>HOLD</kbd> mic to speak &nbsp;·&nbsp; <kbd>RELEASE</kbd> to send
        </div>

      </div>
    </div>

    <!-- RIGHT: Transcript -->
    <div class="panel-right">
      <div class="panel-hdr">
        <span class="panel-hdr-title">TRANSCRIPT / <em>LIVE SESSION</em></span>
        <div class="panel-hdr-right">
          <span class="hdr-stat">MSGS <strong id="h-msgs">0</strong></span>
        </div>
      </div>
      <div id="log">
        <div class="empty-state" id="log-empty">
          <div class="empty-icon">📡</div>
          <div class="empty-text">
            Connect and hold the mic<br/>to start your session
          </div>
        </div>
      </div>
    </div>

  </main>

  <!-- FOOTER -->
  <footer>
    <span class="f-stat">SYS <strong id="f-sys">READY</strong></span>
    <div class="f-divider"></div>
    <span class="f-stat">MSGS <strong id="f-msgs">0</strong></span>
    <div class="f-divider"></div>
    <span class="f-stat">AUDIO <strong>PCM / 24 KHz</strong></span>
    <div class="f-divider"></div>
    <span class="f-stat"><strong>WS/WSS</strong></span>
  </footer>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const SAMPLE_RATE     = 24000;
const END_OF_RESPONSE = new Uint8Array([0xFF, 0xFE]);

// ── DOM ──────────────────────────────────────────────────────────────────────
const phoneInput = document.getElementById('phone-input');
const connectBtn = document.getElementById('connect-btn');
const micBtn     = document.getElementById('mic-btn');
const logEl      = document.getElementById('log');
const logEmpty   = document.getElementById('log-empty');
const vizCanvas  = document.getElementById('viz');
const ctx2d      = vizCanvas.getContext('2d');
const statusPill = document.getElementById('status-pill');
const statusText = document.getElementById('status-text');
const errLine    = document.getElementById('err-line');
const waveBars   = document.getElementById('wave-bars');
const micState   = document.getElementById('mic-state');
const hMsgs      = document.getElementById('h-msgs');
const hSess      = document.getElementById('h-sess');
const fSys       = document.getElementById('f-sys');
const fMsgs      = document.getElementById('f-msgs');

// ── STATE ────────────────────────────────────────────────────────────────────
let ws            = null;
let mediaRecorder = null;
let micStream     = null;
let audioCtx      = null;
let analyser      = null;
let vizRaf        = null;
let pcmQueue      = [];
let isPlaying     = false;
let nextPlayTime  = 0;
let streamDone    = false;
let chunksReceived= 0;
let msgCount      = 0;
let sessTimer     = null;
let sessStart     = null;

// ── CANVAS SIZING ─────────────────────────────────────────────────────────────
function sizeCanvas() {
  const mobile = window.innerWidth <= 680;
  const sz = mobile
    ? Math.min(72, window.innerWidth * 0.18)
    : Math.min(190, window.innerWidth * 0.17, window.innerHeight * 0.3);
  vizCanvas.width = vizCanvas.height = Math.round(sz);
}
sizeCanvas();
window.addEventListener('resize', () => { sizeCanvas(); });

// ── STATUS ────────────────────────────────────────────────────────────────────
function setStatus(msg, cls = '') {
  statusText.textContent = msg;
  statusPill.className   = 'status-pill' + (cls ? ' ' + cls : '');
  fSys.textContent       = msg;
  const labels = { recording:'RECORDING', active:'CONNECTED', playing:'SPEAKING', error:'ERROR', '':'STAND BY' };
  if (micState) micState.textContent = labels[cls] ?? 'STAND BY';
}

function showError(msg) {
  errLine.textContent = msg;
  setTimeout(() => { errLine.textContent = ''; }, 4500);
}

// ── TIMER ─────────────────────────────────────────────────────────────────────
function startTimer() {
  sessStart = Date.now();
  sessTimer = setInterval(() => {
    const s = Math.floor((Date.now() - sessStart) / 1000);
    hSess.textContent = `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  }, 1000);
}
function stopTimer() { clearInterval(sessTimer); hSess.textContent = '--:--'; }

// ── MESSAGES ──────────────────────────────────────────────────────────────────
function ts() {
  return new Date().toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let _typingEl = null;

function addMsg(role, text) {
  if (role === 'agent') hideTyping();
  if (logEmpty?.parentNode) logEmpty.remove();

  msgCount++;
  hMsgs.textContent = msgCount;
  fMsgs.textContent = msgCount;

  const el = document.createElement('div');
  el.className = `msg ${role}`;
  el.innerHTML = `
    <div class="msg-meta">
      <span class="msg-role">${role === 'user' ? '▶ YOU' : '◀ AGENT'}</span>
      <span class="msg-ts">${ts()}</span>
    </div>
    <div class="msg-bubble">${esc(text)}</div>`;
  logEl.appendChild(el);
  logEl.scrollTop = logEl.scrollHeight;
}

function showTyping() {
  if (_typingEl) return;
  if (logEmpty?.parentNode) logEmpty.remove();
  _typingEl = document.createElement('div');
  _typingEl.className = 'msg agent pending';
  _typingEl.innerHTML = `
    <div class="msg-meta">
      <span class="msg-role">◀ AGENT</span>
      <span class="msg-ts">${ts()}</span>
    </div>
    <div class="msg-bubble"><div class="dots"><span></span><span></span><span></span></div></div>`;
  logEl.appendChild(_typingEl);
  logEl.scrollTop = logEl.scrollHeight;
}
function hideTyping() { if (_typingEl) { _typingEl.remove(); _typingEl = null; } }

// ── VISUALIZER ────────────────────────────────────────────────────────────────
function startViz(stream) {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  audioCtx.createMediaStreamSource(stream).connect(analyser);
  drawViz();
}
function stopViz() {
  cancelAnimationFrame(vizRaf);
  const s = vizCanvas.width;
  ctx2d.clearRect(0, 0, s, s);
}

function drawViz() {
  vizRaf = requestAnimationFrame(drawViz);
  const s   = vizCanvas.width;
  const cx  = s / 2, cy = s / 2;
  const r   = s * 0.225;
  const data= new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);
  ctx2d.clearRect(0, 0, s, s);

  const isRec  = micBtn.classList.contains('recording');
  const isPlay = micBtn.classList.contains('playing');
  const N = 54;

  for (let i = 0; i < N; i++) {
    const val   = data[Math.floor(i * data.length / N)] / 255;
    const angle = (i / N) * Math.PI * 2 - Math.PI / 2;
    const inner = r;
    const outer = r + val * (s * 0.175) + (s * 0.024);
    const alpha = 0.28 + val * 0.72;
    ctx2d.strokeStyle = isRec
      ? `rgba(232,64,64,${alpha})`
      : isPlay
        ? `rgba(48,196,122,${alpha})`
        : `rgba(232,160,48,${alpha})`;
    ctx2d.lineWidth = s * 0.015;
    ctx2d.beginPath();
    ctx2d.moveTo(cx + Math.cos(angle) * inner, cy + Math.sin(angle) * inner);
    ctx2d.lineTo(cx + Math.cos(angle) * outer, cy + Math.sin(angle) * outer);
    ctx2d.stroke();
  }

  // Inner ring
  ctx2d.beginPath();
  ctx2d.arc(cx, cy, r - 1.5, 0, Math.PI * 2);
  ctx2d.strokeStyle = isRec ? 'rgba(232,64,64,.18)' : isPlay ? 'rgba(48,196,122,.15)' : 'rgba(232,160,48,.1)';
  ctx2d.lineWidth = 1;
  ctx2d.stroke();
}

// ── PCM PLAYBACK ──────────────────────────────────────────────────────────────
function ensureAudioCtx() {
  if (!audioCtx || audioCtx.state === 'closed')
    audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function enqueuePCM(buf) { pcmQueue.push(buf); if (!isPlaying) drainQueue(); }

function drainQueue() {
  if (!pcmQueue.length) {
    if (streamDone) {
      isPlaying = false;
      micBtn.classList.remove('playing');
      micBtn.disabled = false;
      waveBars.classList.remove('on');
      setStatus('READY', 'active');
    }
    return;
  }
  isPlaying = true;
  micBtn.classList.add('playing');
  micBtn.disabled = true;
  waveBars.classList.add('on');

  const raw     = pcmQueue.shift();
  const samples = new Int16Array(raw);
  const floats  = new Float32Array(samples.length);
  for (let i = 0; i < samples.length; i++) floats[i] = samples[i] / 32768;
  const buf = audioCtx.createBuffer(1, floats.length, SAMPLE_RATE);
  buf.getChannelData(0).set(floats);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.connect(audioCtx.destination);
  const at = Math.max(audioCtx.currentTime, nextPlayTime);
  src.start(at);
  nextPlayTime  = at + buf.duration;
  src.onended   = drainQueue;
}

function isEOR(d) {
  if (d.byteLength !== 2) return false;
  const v = new Uint8Array(d);
  return v[0] === 0xFF && v[1] === 0xFE;
}

// ── WEBSOCKET ─────────────────────────────────────────────────────────────────
async function connect(phone) {
  setStatus('CONNECTING…');
  let token;
  try {
    const r = await fetch(`/auth/token?phone=${encodeURIComponent(phone)}`);
    if (!r.ok) { const e = await r.json().catch(()=>({})); showError(e.detail||'Invalid phone'); setStatus('OFFLINE'); return; }
    token = (await r.json()).token;
  } catch { showError('Cannot reach server'); setStatus('OFFLINE'); return; }

  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/${encodeURIComponent(phone)}?token=${encodeURIComponent(token)}`);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    setStatus('READY', 'active');
    micBtn.disabled = false;
    connectBtn.textContent = 'END';
    connectBtn.classList.add('disc');
    connectBtn.onclick = disconnect;
    startTimer();
  };

  ws.onmessage = (ev) => {
    if (typeof ev.data === 'string') {
      if      (ev.data.startsWith('user:'))  addMsg('user',  ev.data.slice(5));
      else if (ev.data.startsWith('agent:')) addMsg('agent', ev.data.slice(6));
      return;
    }
    if (isEOR(ev.data)) { hideTyping(); streamDone = true; drainQueue(); return; }
    ensureAudioCtx();
    chunksReceived++;
    if (chunksReceived === 1) { nextPlayTime = 0; micBtn.classList.add('playing'); }
    enqueuePCM(ev.data);
  };

  ws.onerror = () => showError('Connection error');
  ws.onclose = (ev) => {
    if (ev.code === 4001) showError('Auth failed — reconnect');
    else if (ev.code === 4000) showError('Invalid phone number');
    setStatus('OFFLINE');
    micBtn.disabled = true;
    waveBars.classList.remove('on');
    connectBtn.textContent = 'CONNECT';
    connectBtn.classList.remove('disc');
    connectBtn.onclick = () => handleConnect();
    stopTimer();
    ws = null;
  };
}

function disconnect() {
  if (mediaRecorder) { mediaRecorder.stop(); mediaRecorder = null; }
  if (micStream)     { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  stopViz();
  if (ws) ws.close();
}

// ── MIC ───────────────────────────────────────────────────────────────────────
async function ensureMic() {
  if (micStream?.active) return micStream;
  micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  startViz(micStream);
  return micStream;
}

async function startRecording() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  try {
    const stream   = await ensureMic();
    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm';
    mediaRecorder  = new MediaRecorder(stream, { mimeType, bitsPerSecond: 64000 });
    mediaRecorder.ondataavailable = (ev) => {
      if (ev.data.size > 0 && ws?.readyState === WebSocket.OPEN) ws.send(ev.data);
    };
    mediaRecorder.start(100);
    micBtn.classList.add('recording');
    setStatus('RECORDING', 'recording');
  } catch { showError('Mic access denied'); }
}

function stopRecording() {
  if (!mediaRecorder) return;
  mediaRecorder.stop(); mediaRecorder = null;
  micBtn.classList.remove('recording');
  if (ws?.readyState === WebSocket.OPEN) {
    ws.send(new Uint8Array([0x00]).buffer);
    setStatus('PROCESSING…', 'active');
    micBtn.disabled = true;
    showTyping();
    streamDone = false; chunksReceived = 0; isPlaying = false; pcmQueue = [];
  }
}

// ── WIRING ────────────────────────────────────────────────────────────────────
function handleConnect() {
  const phone = phoneInput.value.trim();
  if (!phone)              { showError('Enter your phone number'); return; }
  if (!/^\+?\d{7,15}$/.test(phone)) { showError('Enter a valid phone number'); return; }
  connect(phone);
}

connectBtn.onclick = handleConnect;
phoneInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleConnect(); });

micBtn.addEventListener('mousedown',  startRecording);
micBtn.addEventListener('mouseup',    stopRecording);
micBtn.addEventListener('mouseleave', stopRecording);
micBtn.addEventListener('touchstart', e => { e.preventDefault(); startRecording(); }, { passive: false });
micBtn.addEventListener('touchend',   e => { e.preventDefault(); stopRecording(); },  { passive: false });
</script>
</body>
